<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo de Fotos</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    margin:0;
}

header{
    background-color:#333;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    width:90%;
    margin:auto;
}

.galeria{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap:20px;
    margin-top:20px;
}

.foto{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 5px rgba(0,0,0,0.2);
    transition: transform 0.3s;
}

.foto:hover{
    transform: scale(1.05);
}

.foto img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.descricao{
    padding:10px;
    text-align:center;
}

footer{
    background:#333;
    color:white;
    text-align:center;
    padding:10px;
    margin-top:20px;
}

</style>
</head>

<body>

<header>
<h1>Catálogo de Fotos</h1>
<p>Galeria de imagens</p>
</header>

<div class="container">

<div class="galeria">

<div class="foto">
<img src="https://picsum.photos/300/200?1">
<div class="descricao">Foto 1</div>
</div>

<div class="foto">
<img src="https://picsum.photos/300/200?2">
<div class="descricao">Foto 2</div>
</div>

<div class="foto">
<img src="https://picsum.photos/300/200?3">
<div class="descricao">Foto 3</div>
</div>

<div class="foto">
<img src="https://picsum.photos/300/200?4">
<div class="descricao">Foto 4</div>
</div>

<div class="foto">
<img src="https://picsum.photos/300/200?5">
<div class="descricao">Foto 5</div>
</div>

<div class="foto">
<img src="https://picsum.photos/300/200?6">
<div class="descricao">Foto 6</div>
</div>

</div>

</div>

<footer>
<p>Site criado por Cristiane</p>
</footer>

</body>
</html>
