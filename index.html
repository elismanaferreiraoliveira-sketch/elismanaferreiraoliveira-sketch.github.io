<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Página de Crochê</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color: #fff4f7;
    text-align: center;
}

h1{
    color:#d94f70;
}

.container{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    border-radius:10px;
    box-shadow:0 4px 8px rgba(0,0,0,0.2);
    padding:10px;
}

.card img{
    width:100%;
    border-radius:10px;
}

.card h2{
    color:#444;
}
</style>
</head>

<body>

<h1>🧶 Mundo do Crochê</h1>
    < img src"logo.png" alt="png" width="500" height="500">
<p>Veja alguns trabalhos feitos em crochê</p>

<div class="container">

<div class="card">
<h2>Tapetes de Crochê</h2>
<img src="https://www.mixlar.com.br/blog/wp-content/uploads/2016/03/Cod.-4738-4739-Passadeira-e-Tapete-Elegance-Cor-1.jpg" alt="tapete de croche">
</div>

<div class="card">
<h2>Jogo de Sousplat</h2>
<img src="https://imgs.casasbahia.com.br/1566214157/1xg.jpg?imwidth=500" alt="sousplat">
</div>

<div class="card">
<h2>Jogo de Banheiro</h2>
<img src="https://img.elo7.com.br/product/zoom/4B54D6E/jogo-de-banheiro-4-pecas-tapete-croche.jpg" alt="jogo de banheiro">
</div>

<div class="card">
<h2>Croppets</h2>
<img src="https://acdn-us.mitiendanube.com/stores/003/703/090/products/photo-output-dc487a6b49e278d7a617145659862098-1024-1024.webp" alt="crochet">
</div>2830c1

</div>

</body>
</html>
